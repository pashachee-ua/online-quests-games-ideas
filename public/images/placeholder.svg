    </pattern>
    <radialGradient id="glow" cx="80%" cy="0%" r="80%">
      <stop offset="0%" stop-color="rgba(180,71,15,0.22)"/>
      <stop offset="60%" stop-color="rgba(180,71,15,0)"/>
